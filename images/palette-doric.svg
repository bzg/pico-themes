  <text x="495" y="90" text-anchor="middle" font-size="9" fill="#999">accent</text>
  <rect x="518" y="42" width="30" height="30" rx="5" fill="#3a3828"/>
  <text x="533" y="90" text-anchor="middle" font-size="9" fill="#999">border</text>
  <rect x="556" y="42" width="30" height="30" rx="5" fill="#8aaa6a"/>
  <text x="571" y="90" text-anchor="middle" font-size="9" fill="#999">success</text>
  <rect x="594" y="42" width="30" height="30" rx="5" fill="#c4a040"/>
  <text x="609" y="90" text-anchor="middle" font-size="9" fill="#999">warn</text>
  <rect x="632" y="42" width="30" height="30" rx="5" fill="#c46a6a"/>
  <text x="647" y="90" text-anchor="middle" font-size="9" fill="#999">error</text>
  <!-- Hex labels - Light -->
  <text x="31" y="102" text-anchor="middle" font-size="7" fill="#777">#fcfcf8</text>
  <text x="69" y="102" text-anchor="middle" font-size="7" fill="#777">#2b2b28</text>
  <text x="107" y="102" text-anchor="middle" font-size="7" fill="#777">#6b5b3e</text>
  <text x="145" y="102" text-anchor="middle" font-size="7" fill="#777">#6b5b3e</text>
  <text x="183" y="102" text-anchor="middle" font-size="7" fill="#777">#ccc8b8</text>
  <text x="221" y="102" text-anchor="middle" font-size="7" fill="#777">#5a7a4a</text>
  <text x="259" y="102" text-anchor="middle" font-size="7" fill="#777">#8a6d2f</text>
  <text x="297" y="102" text-anchor="middle" font-size="7" fill="#777">#8a3a3a</text>
  <!-- Hex labels - Dark -->
  <text x="381" y="102" text-anchor="middle" font-size="7" fill="#777">#18180e</text>
  <text x="419" y="102" text-anchor="middle" font-size="7" fill="#777">#d0d0c8</text>
  <text x="457" y="102" text-anchor="middle" font-size="7" fill="#777">#c4a86c</text>
  <text x="495" y="102" text-anchor="middle" font-size="7" fill="#777">#c4a86c</text>
  <text x="533" y="102" text-anchor="middle" font-size="7" fill="#777">#3a3828</text>
  <text x="571" y="102" text-anchor="middle" font-size="7" fill="#777">#8aaa6a</text>
  <text x="609" y="102" text-anchor="middle" font-size="7" fill="#777">#c4a040</text>
  <text x="647" y="102" text-anchor="middle" font-size="7" fill="#777">#c46a6a</text>
  <!-- Theme name -->
  <text x="350" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">Doric</text>
  <!-- Divider -->
  <line x1="350" y1="0" x2="350" y2="180" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
