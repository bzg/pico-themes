  <rect x="130" y="42" width="30" height="30" rx="5" fill="#6b5b3e"/>
  <text x="145" y="90" text-anchor="middle" font-size="9" fill="#555">accent</text>
  <rect x="168" y="42" width="30" height="30" rx="5" fill="#ccc8b8"/>
  <text x="183" y="90" text-anchor="middle" font-size="9" fill="#555">border</text>
  <rect x="206" y="42" width="30" height="30" rx="5" fill="#5a7a4a"/>
