<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
  </defs>
  <!-- Light half -->
  <rect x="0" y="0" width="350" height="180" fill="#f5f5f5"/>
  <text x="175" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Light</text>
  <!-- Dark half -->
  <rect x="350" y="0" width="350" height="180" fill="#222"/>
  <text x="525" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#ccc">Dark</text>
  <!-- Light swatches -->
  <rect x="16" y="42" width="30" height="30" rx="5" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="31" y="90" text-anchor="middle" font-size="9" fill="#555">bg</text>
  <rect x="54" y="42" width="30" height="30" rx="5" fill="#2a2a2a"/>
  <text x="69" y="90" text-anchor="middle" font-size="9" fill="#555">text</text>
  <rect x="92" y="42" width="30" height="30" rx="5" fill="#505050"/>
  <text x="107" y="90" text-anchor="middle" font-size="9" fill="#555">primary</text>
  <rect x="130" y="42" width="30" height="30" rx="5" fill="#505050"/>
  <text x="145" y="90" text-anchor="middle" font-size="9" fill="#555">accent</text>
  <rect x="168" y="42" width="30" height="30" rx="5" fill="#d0d0d0"/>
  <text x="183" y="90" text-anchor="middle" font-size="9" fill="#555">border</text>
  <rect x="206" y="42" width="30" height="30" rx="5" fill="#505050"/>
  <text x="221" y="90" text-anchor="middle" font-size="9" fill="#555">success</text>
  <rect x="244" y="42" width="30" height="30" rx="5" fill="#707070"/>
  <text x="259" y="90" text-anchor="middle" font-size="9" fill="#555">warn</text>
  <rect x="282" y="42" width="30" height="30" rx="5" fill="#484848"/>
  <text x="297" y="90" text-anchor="middle" font-size="9" fill="#555">error</text>
  <!-- Dark swatches -->
  <rect x="366" y="42" width="30" height="30" rx="5" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="381" y="90" text-anchor="middle" font-size="9" fill="#999">bg</text>
  <rect x="404" y="42" width="30" height="30" rx="5" fill="#d0d0d0"/>
  <text x="419" y="90" text-anchor="middle" font-size="9" fill="#999">text</text>
  <rect x="442" y="42" width="30" height="30" rx="5" fill="#b0b0b0"/>
  <text x="457" y="90" text-anchor="middle" font-size="9" fill="#999">primary</text>
  <rect x="480" y="42" width="30" height="30" rx="5" fill="#b0b0b0"/>
  <text x="495" y="90" text-anchor="middle" font-size="9" fill="#999">accent</text>
  <rect x="518" y="42" width="30" height="30" rx="5" fill="#383838"/>
  <text x="533" y="90" text-anchor="middle" font-size="9" fill="#999">border</text>
  <rect x="556" y="42" width="30" height="30" rx="5" fill="#b0b0b0"/>
  <text x="571" y="90" text-anchor="middle" font-size="9" fill="#999">success</text>
  <rect x="594" y="42" width="30" height="30" rx="5" fill="#909090"/>
  <text x="609" y="90" text-anchor="middle" font-size="9" fill="#999">warn</text>
  <rect x="632" y="42" width="30" height="30" rx="5" fill="#c0c0c0"/>
  <text x="647" y="90" text-anchor="middle" font-size="9" fill="#999">error</text>
  <!-- Hex labels - Light -->
  <text x="31" y="102" text-anchor="middle" font-size="7" fill="#777">#fafafa</text>
  <text x="69" y="102" text-anchor="middle" font-size="7" fill="#777">#2a2a2a</text>
  <text x="107" y="102" text-anchor="middle" font-size="7" fill="#777">#505050</text>
  <text x="145" y="102" text-anchor="middle" font-size="7" fill="#777">#505050</text>
  <text x="183" y="102" text-anchor="middle" font-size="7" fill="#777">#d0d0d0</text>
  <text x="221" y="102" text-anchor="middle" font-size="7" fill="#777">#505050</text>
  <text x="259" y="102" text-anchor="middle" font-size="7" fill="#777">#707070</text>
  <text x="297" y="102" text-anchor="middle" font-size="7" fill="#777">#484848</text>
  <!-- Hex labels - Dark -->
  <text x="381" y="102" text-anchor="middle" font-size="7" fill="#777">#111111</text>
  <text x="419" y="102" text-anchor="middle" font-size="7" fill="#777">#d0d0d0</text>
  <text x="457" y="102" text-anchor="middle" font-size="7" fill="#777">#b0b0b0</text>
  <text x="495" y="102" text-anchor="middle" font-size="7" fill="#777">#b0b0b0</text>
  <text x="533" y="102" text-anchor="middle" font-size="7" fill="#777">#383838</text>
  <text x="571" y="102" text-anchor="middle" font-size="7" fill="#777">#b0b0b0</text>
  <text x="609" y="102" text-anchor="middle" font-size="7" fill="#777">#909090</text>
  <text x="647" y="102" text-anchor="middle" font-size="7" fill="#777">#c0c0c0</text>
  <!-- Theme name -->
  <text x="350" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">Teletype</text>
  <!-- Divider -->
  <line x1="350" y1="0" x2="350" y2="180" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
</svg>