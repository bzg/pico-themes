<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
  </defs>
  <!-- Light half -->
  <rect x="0" y="0" width="350" height="180" fill="#f5f5f5"/>
  <text x="175" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Light</text>
  <!-- Dark half -->
  <rect x="350" y="0" width="350" height="180" fill="#222"/>
  <text x="525" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#ccc">Dark</text>
  <!-- Light swatches -->
  <rect x="16" y="42" width="30" height="30" rx="5" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <text x="31" y="90" text-anchor="middle" font-size="9" fill="#555">bg</text>
  <rect x="54" y="42" width="30" height="30" rx="5" fill="#212529"/>
  <text x="69" y="90" text-anchor="middle" font-size="9" fill="#555">text</text>
  <rect x="92" y="42" width="30" height="30" rx="5" fill="#191970"/>
  <text x="107" y="90" text-anchor="middle" font-size="9" fill="#555">primary</text>
  <rect x="130" y="42" width="30" height="30" rx="5" fill="#191970"/>
  <text x="145" y="90" text-anchor="middle" font-size="9" fill="#555">accent</text>
  <rect x="168" y="42" width="30" height="30" rx="5" fill="#dee2e6"/>
  <text x="183" y="90" text-anchor="middle" font-size="9" fill="#555">border</text>
  <rect x="206" y="42" width="30" height="30" rx="5" fill="#2D6A4F"/>
  <text x="221" y="90" text-anchor="middle" font-size="9" fill="#555">success</text>
  <rect x="244" y="42" width="30" height="30" rx="5" fill="#B8860B"/>
  <text x="259" y="90" text-anchor="middle" font-size="9" fill="#555">warn</text>
  <rect x="282" y="42" width="30" height="30" rx="5" fill="#D66853"/>
  <text x="297" y="90" text-anchor="middle" font-size="9" fill="#555">error</text>
  <!-- Dark swatches -->
  <rect x="366" y="42" width="30" height="30" rx="5" fill="#141420" stroke="#555" stroke-width="1"/>
  <text x="381" y="90" text-anchor="middle" font-size="9" fill="#999">bg</text>
  <rect x="404" y="42" width="30" height="30" rx="5" fill="#c8c8c8"/>
  <text x="419" y="90" text-anchor="middle" font-size="9" fill="#999">text</text>
  <rect x="442" y="42" width="30" height="30" rx="5" fill="#7B8FBF"/>
  <text x="457" y="90" text-anchor="middle" font-size="9" fill="#999">primary</text>
  <rect x="480" y="42" width="30" height="30" rx="5" fill="#7B8FBF"/>
  <text x="495" y="90" text-anchor="middle" font-size="9" fill="#999">accent</text>
  <rect x="518" y="42" width="30" height="30" rx="5" fill="#343a50"/>
  <text x="533" y="90" text-anchor="middle" font-size="9" fill="#999">border</text>
  <rect x="556" y="42" width="30" height="30" rx="5" fill="#52B788"/>
  <text x="571" y="90" text-anchor="middle" font-size="9" fill="#999">success</text>
  <rect x="594" y="42" width="30" height="30" rx="5" fill="#DAA520"/>
  <text x="609" y="90" text-anchor="middle" font-size="9" fill="#999">warn</text>
  <rect x="632" y="42" width="30" height="30" rx="5" fill="#E8937E"/>
  <text x="647" y="90" text-anchor="middle" font-size="9" fill="#999">error</text>
  <!-- Hex labels - Light -->
  <text x="31" y="102" text-anchor="middle" font-size="7" fill="#777">#ffffff</text>
  <text x="69" y="102" text-anchor="middle" font-size="7" fill="#777">#212529</text>
  <text x="107" y="102" text-anchor="middle" font-size="7" fill="#777">#191970</text>
  <text x="145" y="102" text-anchor="middle" font-size="7" fill="#777">#191970</text>
  <text x="183" y="102" text-anchor="middle" font-size="7" fill="#777">#dee2e6</text>
  <text x="221" y="102" text-anchor="middle" font-size="7" fill="#777">#2D6A4F</text>
  <text x="259" y="102" text-anchor="middle" font-size="7" fill="#777">#B8860B</text>
  <text x="297" y="102" text-anchor="middle" font-size="7" fill="#777">#D66853</text>
  <!-- Hex labels - Dark -->
  <text x="381" y="102" text-anchor="middle" font-size="7" fill="#777">#141420</text>
  <text x="419" y="102" text-anchor="middle" font-size="7" fill="#777">#c8c8c8</text>
  <text x="457" y="102" text-anchor="middle" font-size="7" fill="#777">#7B8FBF</text>
  <text x="495" y="102" text-anchor="middle" font-size="7" fill="#777">#7B8FBF</text>
  <text x="533" y="102" text-anchor="middle" font-size="7" fill="#777">#343a50</text>
  <text x="571" y="102" text-anchor="middle" font-size="7" fill="#777">#52B788</text>
  <text x="609" y="102" text-anchor="middle" font-size="7" fill="#777">#DAA520</text>
  <text x="647" y="102" text-anchor="middle" font-size="7" fill="#777">#E8937E</text>
  <!-- Theme name -->
  <text x="350" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">Lincoln</text>
  <!-- Divider -->
  <line x1="350" y1="0" x2="350" y2="180" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
</svg>